name: CI

on:
    workflow_dispatch:
    pull_request:
        types: [opened, synchronize, reopened]
    push:
        branches:
            - main

jobs:
    quality-checks:
        name: Lint, Type Check & Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Python environment with uv
              uses: astral-sh/setup-uv@v7
              with:
                enable-cache: true
                python-version: "3.11"

            - name: Install dependencies
              shell: bash
              run: uv sync --locked --all-extras

            - name: Ruff lint and format check
              run: |
                uv run make ruff-lint --just-print --silent
                uv run make ruff-format --just-print --silent

            - name: MyPy type check
              run: uv run make mypy

            - name: PyTest tests
              run: COV_REPORT=xml uv run make pytest

            - name: Upload coverage report
              uses: actions/upload-artifact@v7
              with:
                name: mgo-keystore-repository-coverage
                path: coverage.xml

    sonar-analysis:
      name: Static Analysis (SonarQube)
      runs-on: ubuntu-latest
      needs: quality-checks
      steps:
          - name: Checkout repository
            uses: actions/checkout@v6
            with:
                fetch-depth: 0

          - name: Download coverage report
            uses: actions/download-artifact@v8

          - name: Run SonarQube scan
            uses: minvws/action-sonarqube@v1
            with:
                sonar-token: ${{ secrets.SONAR_TOKEN }}
                allow-run-on-dependabot: 'true'

name: CI

on:
    workflow_dispatch:
    pull_request:
        types: [opened, synchronize, reopened]
    push:
        branches:
            - main

jobs:
    setup:
        name: Setup
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Python environment with uv
              uses: astral-sh/setup-uv@v7
              with:
                enable-cache: true
                python-version: "3.11"

            - name: Install dependencies
              shell: bash
              run: uv sync --locked --all-extras

            - name: Ruff lint and format check
              run: |
                uv run make ruff-lint --just-print --silent
                uv run make ruff-format --just-print --silent

            - name: MyPy type check
              run: uv run make mypy

            - name: PyTest tests
              run: COV_REPORT=xml uv run make pytest

            - name: Upload coverage report
              uses: actions/upload-artifact@v7
              with:
                name: mgo-healthchecker-coverage
                path: coverage.xml

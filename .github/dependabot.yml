version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "uv"
    groups:
      production-dependencies:
          dependency-type: "production"
      development-dependencies:
          dependency-type: "development"

    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
        interval: "monthly"
